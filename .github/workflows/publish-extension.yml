name: Publish Extension

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-server:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: server-win32-x64
            binary-name: server.exe
            binary-path: build/Release/luau-lsp.exe
            vsce-target: win32-x64
          - os: ubuntu-22.04
            artifact-name: server-linux-x64
            binary-name: server
            binary-path: build/luau-lsp
            vsce-target: linux-x64
          - os: macos-latest
            artifact-name: server-darwin-x64
            binary-name: server
            binary-path: build/luau-lsp
            vsce-target: darwin-x64

    name: Build Server (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Server
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DLSP_STATIC_CRT:BOOL=ON
          cmake --build . --config Release --target Luau.LanguageServer.CLI -j 3

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          cp "${{ matrix.binary-path }}" "staging/${{ matrix.binary-name }}"

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: staging/

  package-and-publish:
    needs: build-server
    name: Package & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        working-directory: editors/code
        run: npm ci

      - name: Download all server binaries
        uses: actions/download-artifact@v4
        with:
          path: server-binaries

      - name: Package VSIX for each platform
        working-directory: editors/code
        run: |
          for target in win32-x64 linux-x64 darwin-x64; do
            rm -rf bin && mkdir bin
            cp ../../server-binaries/server-${target}/* bin/
            chmod +x bin/server* || true
            npx @vscode/vsce package --target ${target} -o luau-lsp-${target}.vsix
          done

      - name: Upload VSIX artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vsix-all
          path: editors/code/*.vsix

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: editors/code
        run: npx @vscode/vsce publish --packagePath luau-lsp-win32-x64.vsix --packagePath luau-lsp-linux-x64.vsix --packagePath luau-lsp-darwin-x64.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      #   run: npx ovsx publish luau-lsp-${{ matrix.vsce-target }}.vsix --target ${{ matrix.vsce-target }}
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
