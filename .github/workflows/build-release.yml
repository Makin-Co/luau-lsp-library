name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact-name: luau-lsp-win64
            binary-path: build/Release/luau-lsp.exe
          - os: ubuntu-22.04
            artifact-name: luau-lsp-linux-x86_64
            binary-path: build/luau-lsp
          - os: macos-latest
            artifact-name: luau-lsp-macos
            binary-path: build/luau-lsp

    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Server
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DLSP_STATIC_CRT:BOOL=ON
          cmake --build . --config Release --target Luau.LanguageServer.CLI -j 3

      - name: Create Release Archive
        shell: bash
        run: |
          mkdir staging
          cp "${{ matrix.binary-path }}" staging/
          cd staging
          if command -v zip &> /dev/null; then
            zip ../server.zip *
          else
            7z a ../server.zip *
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: server.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            mv "$dir/server.zip" "artifacts/${name}.zip"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*.zip
